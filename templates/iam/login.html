<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900">
<head>
    <meta charset="UTF-8">
    <title>NexusERP Gateway Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="h-full flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 space-y-6">
        <div class="text-center space-y-2">
            <div class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-indigo-100 text-indigo-600">
                <!-- Changed lock to fa-lock -->
                <i class="fa-solid fa-lock text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">NexusERP Infrastructure</h1>
            <p class="text-sm text-slate-500">Sign in to initialize secure operations token</p>
        </div>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Corporate Identifier</label>
                <input type="text" name="username" required class="w-full rounded-lg border border-slate-200 p-2.5 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Security Keyphrase</label>
                <input type="password" name="password" required class="w-full rounded-lg border border-slate-200 p-2.5 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white rounded-lg p-3 font-semibold hover:bg-indigo-500 shadow-md transition flex items-center justify-center gap-2">
                <!-- Changed shield-check to fa-shield-halved -->
                <i class="fa-solid fa-shield-halved text-sm"></i> Establish Connection Token
            </button>
        </form>
    </div>
</body>
</html>
