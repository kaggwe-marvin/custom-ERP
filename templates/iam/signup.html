<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-900">
<head>
    <meta charset="UTF-8">
    <title>CustomERP // Onboarding Portal</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="h-full flex items-center justify-center p-6">
    <div class="max-w-xl w-full bg-white rounded-2xl shadow-2xl p-8 space-y-6">
        <div class="text-center space-y-2">
            <div class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-indigo-100 text-indigo-600">
               
                <i class="fa-solid fa-user-plus text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Onboard Profile</h1>
            <p class="text-sm text-slate-500">Initialize your secure organizational token keys</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Corporate Handle</label>
                    <input type="text" name="username" required class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Secure Email</label>
                    <input type="email" name="email" required class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">First Name</label>
                    <input type="text" name="first_name" required class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Last Name</label>
                    <input type="text" name="last_name" required class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Functional Title</label>
                    <select name="job_title" class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 text-sm">
                        <option value="SALES_REP">Sales Representative</option>
                        <option value="FINANCE_MGR">Finance Manager</option>
                        <option value="HR_SPECIALIST">HR Specialist</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Department</label>
                    <input type="text" name="department" required placeholder="e.g. Accounts" class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Operational Area</label>
                    <select name="region" class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 text-sm">
                        <option value="EU">Europe (EU)</option>
                        <option value="US">United States (US)</option>
                        <option value="Global">Global HQ</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Access Keyphrase</label>
                    <input type="password" name="password1" required class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Confirm Keyphrase</label>
                    <input type="password" name="password2" required class="w-full rounded-lg border border-slate-200 p-2 bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white rounded-lg p-3 font-semibold hover:bg-indigo-500 shadow-md transition flex items-center justify-center gap-2">
                <!-- Changed check-circle to fa-circle-check -->
                <i class="fa-solid fa-circle-check text-sm"></i> Provision Profile Entry
            </button>
        </form>
        <div class="text-center">
            <a href="{% url 'apps_iam:login' %}" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Return to Access Gateway</a>
        </div>
    </div>
</body>
</html>
